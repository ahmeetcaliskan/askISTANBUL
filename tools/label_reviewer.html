<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>askISTANBUL — QA Label Reviewer</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
  /* ===================================================================
     Color system
     =================================================================== */
  :root {
    --bg: #f7f7fb;
    --bg-2: #eef0ff;
    --card: #ffffff;
    --border: #e5e7eb;
    --border-strong: #d1d5db;
    --text: #111827;
    --text-soft: #374151;
    --muted: #6b7280;

    --primary: #4f46e5;        /* indigo */
    --primary-soft: #eef2ff;
    --primary-hover: #4338ca;

    --success: #059669;        /* emerald */
    --success-soft: #ecfdf5;

    --warn: #d97706;           /* amber */
    --warn-soft: #fffbeb;

    --danger: #dc2626;         /* rose */
    --danger-soft: #fef2f2;

    --shadow-sm: 0 1px 2px rgba(17, 24, 39, 0.04), 0 1px 3px rgba(17, 24, 39, 0.06);
    --shadow-md: 0 4px 6px -1px rgba(17, 24, 39, 0.06), 0 2px 4px -2px rgba(17, 24, 39, 0.04);
    --shadow-lg: 0 10px 20px -3px rgba(17, 24, 39, 0.08), 0 4px 8px -4px rgba(17, 24, 39, 0.06);
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    background: linear-gradient(180deg, var(--bg-2) 0%, var(--bg) 240px) fixed;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

  /* ===================================================================
     Header
     =================================================================== */
  .header {
    position: sticky;
    top: 0;
    background: rgba(247, 247, 251, 0.85);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
    z-index: 30;
  }
  .header-inner { padding: 14px 0 0 0; }
  .header h1 {
    margin: 0 0 8px 0;
    font-size: 1.25rem;
    font-weight: 700;
    letter-spacing: -0.01em;
    background: linear-gradient(90deg, #4f46e5 0%, #7c3aed 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    display: inline-block;
  }

  /* ----- Tab nav (pill style) ----- */
  .tabs {
    display: flex;
    gap: 4px;
    margin: 4px 0 12px 0;
    background: var(--card);
    padding: 4px;
    border-radius: 10px;
    width: fit-content;
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--border);
  }
  .tab {
    padding: 7px 16px;
    background: transparent;
    border: none;
    border-radius: 7px;
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .tab:hover { color: var(--text); background: var(--bg); }
  .tab.active {
    color: var(--primary);
    background: var(--primary-soft);
    font-weight: 600;
  }

  .toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    padding-bottom: 12px;
  }
  .toolbar > * { flex-shrink: 0; }

  /* ===================================================================
     Buttons & form controls
     =================================================================== */
  button {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 14px;
    font-size: 0.875rem;
    font-weight: 500;
    cursor: pointer;
    color: var(--text);
    transition: all 0.12s ease;
    box-shadow: var(--shadow-sm);
    font-family: inherit;
  }
  button:hover {
    border-color: var(--border-strong);
    transform: translateY(-1px);
    box-shadow: var(--shadow-md);
  }
  button:active { transform: translateY(0); }

  button.primary {
    background: linear-gradient(135deg, var(--primary) 0%, #6366f1 100%);
    color: white;
    border-color: transparent;
    font-weight: 600;
  }
  button.primary:hover { filter: brightness(1.08); }
  button.primary:disabled {
    background: var(--border);
    color: var(--muted);
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
    filter: none;
  }

  button.success {
    background: linear-gradient(135deg, var(--success) 0%, #10b981 100%);
    color: white;
    border-color: transparent;
    font-weight: 600;
  }
  button.success:hover { filter: brightness(1.08); }
  button.success:disabled {
    background: var(--border);
    color: var(--muted);
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
    filter: none;
  }

  button.danger { color: var(--danger); border-color: var(--border); }
  button.danger:hover { background: var(--danger-soft); border-color: var(--danger); }

  button.ghost {
    background: transparent;
    border: 1px solid transparent;
    color: var(--muted);
    box-shadow: none;
  }
  button.ghost:hover {
    background: var(--bg);
    color: var(--text);
    box-shadow: none;
    transform: none;
    border-color: var(--border);
  }

  select, input[type="text"] {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 12px;
    font-size: 0.875rem;
    color: var(--text);
    font-family: inherit;
    transition: all 0.12s ease;
    box-shadow: var(--shadow-sm);
  }
  select:hover, input[type="text"]:hover { border-color: var(--border-strong); }
  select:focus, input:focus, textarea:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.12);
  }

  /* ===================================================================
     Stats / status
     =================================================================== */
  .stats {
    font-size: 0.85rem;
    color: var(--muted);
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .stats .badge {
    color: var(--text);
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .stats .modified { color: var(--warn); }
  .stats .save-time {
    color: var(--success);
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }

  /* ===================================================================
     Empty state
     =================================================================== */
  .empty {
    text-align: center;
    padding: 80px 20px 40px 20px;
    color: var(--muted);
  }
  .empty .icon {
    font-size: 56px;
    margin-bottom: 16px;
    filter: grayscale(0.2);
  }
  .empty h2 {
    color: var(--text);
    margin: 0 0 12px 0;
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .empty p { max-width: 560px; margin: 8px auto; }
  .empty code {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 0.85em;
    color: var(--text-soft);
  }
  .empty-actions {
    margin-top: 28px;
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }

  /* ===================================================================
     QA item card
     =================================================================== */
  .items { padding: 20px 0 64px 0; }

  .item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    margin-bottom: 16px;
    position: relative;
    box-shadow: var(--shadow-sm);
    transition: box-shadow 0.15s ease, border-color 0.15s ease;
  }
  .item:hover { box-shadow: var(--shadow-md); }
  .item.modified {
    border-color: var(--warn);
    box-shadow: 0 0 0 3px var(--warn-soft), var(--shadow-md);
  }
  .item .mod-flag {
    position: absolute;
    top: -10px;
    right: 16px;
    background: linear-gradient(135deg, var(--warn) 0%, #fb923c 100%);
    color: white;
    font-size: 0.7rem;
    padding: 3px 10px;
    border-radius: 999px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    box-shadow: var(--shadow-sm);
  }
  .item-head {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .id {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    background: var(--bg);
    padding: 5px 12px;
    border-radius: 8px;
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--text-soft);
    border: 1px solid var(--border);
  }

  /* Colored category / difficulty selects — colors set via inline style */
  select.cat, select.diff {
    border-radius: 999px;
    padding: 5px 14px;
    font-weight: 600;
    font-size: 0.78rem;
    border-width: 1px;
    border-style: solid;
  }

  .field { margin-bottom: 14px; }
  .field-label {
    display: block;
    font-size: 0.72rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
    font-weight: 700;
  }
  textarea {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 0.9rem;
    font-family: inherit;
    line-height: 1.55;
    color: var(--text);
    resize: vertical;
    min-height: 48px;
    transition: all 0.12s ease;
  }
  textarea:hover { border-color: var(--border-strong); }

  /* ===================================================================
     Chunk pills + inline chunk search
     =================================================================== */
  .chunks-row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .chunk-pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--primary-soft);
    border: 1px solid #dbeafe;
    border-radius: 999px;
    padding: 3px 4px 3px 10px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 0.78rem;
    color: var(--primary);
    font-weight: 500;
  }
  .chunk-pill button {
    border: none;
    background: transparent;
    padding: 0 6px;
    color: var(--primary);
    cursor: pointer;
    border-radius: 999px;
    font-size: 1rem;
    line-height: 1;
    box-shadow: none;
  }
  .chunk-pill button:hover {
    background: rgba(79, 70, 229, 0.15);
    color: var(--danger);
    transform: none;
    box-shadow: none;
  }
  .chunk-add-input {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 0.78rem;
    min-width: 200px;
    padding: 5px 10px !important;
  }

  .chunk-search-results {
    margin-top: 10px;
    max-height: 240px;
    overflow-y: auto;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--card);
    box-shadow: var(--shadow-sm);
  }
  .chunk-search-result {
    padding: 8px 12px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
    transition: background 0.1s;
  }
  .chunk-search-result:last-child { border-bottom: none; }
  .chunk-search-result:hover { background: var(--primary-soft); }
  .chunk-search-result .meta {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    color: var(--muted);
    font-size: 0.72rem;
    margin-bottom: 2px;
  }
  .chunk-search-result.added { opacity: 0.5; cursor: default; }
  .chunk-search-result.added:hover { background: transparent; }

  /* ===================================================================
     Chunks browse panel
     =================================================================== */
  .chunks-controls {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    padding: 16px 0 12px 0;
    position: sticky;
    top: 100px;
    background: rgba(247, 247, 251, 0.92);
    backdrop-filter: blur(8px);
    z-index: 5;
  }
  .chunks-controls .search-input { flex: 1; min-width: 280px; }
  .chunks-list { padding: 4px 0 64px 0; }

  .chunk-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    margin-bottom: 14px;
    box-shadow: var(--shadow-sm);
    transition: all 0.15s ease;
    border-left: 4px solid var(--cat-color, var(--primary));
  }
  .chunk-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
  .chunk-card-head {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 10px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .chunk-card-head .id {
    background: var(--primary-soft);
    color: var(--primary);
    border-color: #dbeafe;
  }
  .chunk-card-head .title { font-weight: 600; color: var(--text); }
  .chunk-card-head .heading { color: var(--muted); }
  .chunk-card-head .sep { color: var(--border-strong); }
  .chunk-card-head .tail { margin-left: auto; display: flex; gap: 6px; }
  .chunk-card-text {
    font-size: 0.92rem;
    line-height: 1.65;
    white-space: pre-wrap;
    word-break: break-word;
    color: var(--text-soft);
  }
  .chunk-card-meta {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 10px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
  }
  .chunk-card-meta a { color: var(--primary); text-decoration: none; }
  .chunk-card-meta a:hover { text-decoration: underline; }

  /* ===================================================================
     Toast
     =================================================================== */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--text);
    color: white;
    padding: 12px 22px;
    border-radius: 10px;
    font-size: 0.875rem;
    font-weight: 500;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
    z-index: 100;
    opacity: 0;
    transition: opacity 0.18s ease, transform 0.18s ease;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .nav-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 8px 0;
    font-size: 0.85rem;
    color: var(--muted);
  }

  /* Smaller breakpoint adjustments */
  @media (max-width: 720px) {
    .chunks-controls { position: static; }
    .stats { width: 100%; margin-left: 0; }
  }
</style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo, useRef, useCallback } = React;

const CATEGORIES = [
  "Transportation",
  "Food & Drink",
  "Accommodation",
  "Attractions & Sightseeing",
  "Practical Info",
  "Culture & Customs",
  "Shopping",
  "Health & Safety",
  "Itinerary & Planning",
  "Activities & Entertainment",
];
const DIFFICULTIES = ["factual", "synthesis", "inference"];

// One color per category. `bg`/`text`/`border` form a coherent pastel triple.
const CATEGORY_COLORS = {
  "Transportation":            { bg: "#dbeafe", text: "#1d4ed8", border: "#bfdbfe" },
  "Food & Drink":              { bg: "#ffedd5", text: "#c2410c", border: "#fed7aa" },
  "Accommodation":             { bg: "#ede9fe", text: "#6d28d9", border: "#ddd6fe" },
  "Attractions & Sightseeing": { bg: "#ccfbf1", text: "#0f766e", border: "#99f6e4" },
  "Practical Info":            { bg: "#e2e8f0", text: "#334155", border: "#cbd5e1" },
  "Culture & Customs":         { bg: "#ffe4e6", text: "#be123c", border: "#fecdd3" },
  "Shopping":                  { bg: "#fce7f3", text: "#be185d", border: "#fbcfe8" },
  "Health & Safety":           { bg: "#fee2e2", text: "#b91c1c", border: "#fecaca" },
  "Itinerary & Planning":      { bg: "#dcfce7", text: "#15803d", border: "#bbf7d0" },
  "Activities & Entertainment":{ bg: "#e0e7ff", text: "#4338ca", border: "#c7d2fe" },
};

const DIFFICULTY_COLORS = {
  factual:   { bg: "#e0f2fe", text: "#0369a1", border: "#bae6fd" },
  synthesis: { bg: "#f3e8ff", text: "#6b21a8", border: "#e9d5ff" },
  inference: { bg: "#fef3c7", text: "#92400e", border: "#fde68a" },
};

function chipStyle(map, key) {
  const c = map[key];
  if (!c) return undefined;
  return { background: c.bg, color: c.text, borderColor: c.border };
}

function articleColor(title) {
  // Deterministic hue per article so chunk cards get a varied left-border stripe.
  let h = 0;
  for (let i = 0; i < (title || "").length; i++) h = (h * 31 + title.charCodeAt(i)) % 360;
  return `hsl(${h}, 70%, 55%)`;
}

const FS_ACCESS_SUPPORTED = typeof window.showOpenFilePicker === "function";

// =======================================================================
// IndexedDB — remember last-used file handles per panel.
// =======================================================================

const IDB_NAME = "askistanbul-reviewer";
const IDB_STORE = "handles";

function idbOpen() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = () => req.result.createObjectStore(IDB_STORE);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function idbGet(key) {
  try {
    const db = await idbOpen();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, "readonly");
      const r = tx.objectStore(IDB_STORE).get(key);
      r.onsuccess = () => resolve(r.result);
      r.onerror = () => reject(r.error);
    });
  } catch { return undefined; }
}
async function idbSet(key, value) {
  try {
    const db = await idbOpen();
    await new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, "readwrite");
      tx.objectStore(IDB_STORE).put(value, key);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  } catch { /* non-fatal */ }
}

// =======================================================================
// File I/O
// =======================================================================

async function openJsonlFile(panelKey) {
  const opts = {
    types: [{
      description: "JSONL",
      accept: { "application/jsonlines": [".jsonl"], "text/plain": [".jsonl", ".json"] },
    }],
    multiple: false,
  };
  const prior = panelKey ? await idbGet(`startIn_${panelKey}`) : null;
  if (prior) {
    opts.startIn = prior;
  } else {
    const other = panelKey === "qa" ? "chunks" : "qa";
    const fallback = await idbGet(`startIn_${other}`);
    if (fallback) opts.startIn = fallback;
  }
  const [handle] = await window.showOpenFilePicker(opts);
  if (panelKey) await idbSet(`startIn_${panelKey}`, handle);
  const file = await handle.getFile();
  const text = await file.text();
  return { handle, name: file.name, items: parseJsonl(text) };
}

async function openJsonlFromInput(file) {
  const text = await file.text();
  return { handle: null, name: file.name, items: parseJsonl(text) };
}

function parseJsonl(text) {
  const out = [];
  text.split("\n").forEach((line, idx) => {
    const t = line.trim();
    if (!t) return;
    try { out.push(JSON.parse(t)); }
    catch (e) { console.warn(`line ${idx + 1}: ${e.message}`); }
  });
  return out;
}

function serializeJsonl(items) {
  return items.map((it) => JSON.stringify(it)).join("\n") + "\n";
}
async function writeToHandle(handle, text) {
  const w = await handle.createWritable();
  await w.write(text);
  await w.close();
}
function downloadText(filename, text) {
  const blob = new Blob([text], { type: "application/jsonlines" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// =======================================================================
// Components — Question editor
// =======================================================================

function ChunkPill({ id, onRemove }) {
  return (
    <span className="chunk-pill" title={id}>
      {id}
      <button onClick={onRemove} aria-label={`remove ${id}`}>×</button>
    </span>
  );
}

function ChunkSearch({ chunks, alreadyAdded, onAdd, onClose }) {
  const [q, setQ] = useState("");
  const results = useMemo(() => {
    if (!chunks) return [];
    const needle = q.trim().toLowerCase();
    if (!needle) return [];
    return chunks
      .filter((c) =>
        c.chunk_id.toLowerCase().includes(needle) ||
        (c.title || "").toLowerCase().includes(needle) ||
        (c.heading || "").toLowerCase().includes(needle) ||
        (c.text || "").toLowerCase().includes(needle)
      )
      .slice(0, 25);
  }, [chunks, q]);

  return (
    <div style={{ marginTop: 10 }}>
      <div style={{ display: "flex", gap: 8 }}>
        <input
          type="text"
          placeholder="Search chunks by id, title, heading, or text…"
          value={q}
          onChange={(e) => setQ(e.target.value)}
          style={{ flex: 1 }}
          autoFocus
        />
        <button onClick={onClose}>Close</button>
      </div>
      {results.length > 0 && (
        <div className="chunk-search-results">
          {results.map((c) => {
            const added = alreadyAdded.has(c.chunk_id);
            return (
              <div
                key={c.chunk_id}
                className={"chunk-search-result " + (added ? "added" : "")}
                onClick={() => { if (!added) onAdd(c.chunk_id); }}
              >
                <div className="meta">{c.chunk_id} · {c.title} → {c.heading}</div>
                <div>{(c.text || "").slice(0, 140)}{(c.text || "").length > 140 ? "…" : ""}</div>
              </div>
            );
          })}
        </div>
      )}
      {q && results.length === 0 && (
        <div style={{ padding: 8, fontSize: "0.85rem", color: "var(--muted)" }}>No matches.</div>
      )}
    </div>
  );
}

function Item({ item, modified, chunks, onChange, onRemove }) {
  const [showSearch, setShowSearch] = useState(false);
  const [chunkInput, setChunkInput] = useState("");
  const rels = item.relevant_chunk_ids || [];
  const relSet = useMemo(() => new Set(rels), [rels]);

  const update = (field, value) => onChange({ ...item, [field]: value });

  const addChunk = (id) => {
    id = (id || "").trim();
    if (!id || relSet.has(id)) return;
    update("relevant_chunk_ids", [...rels, id]);
  };
  const removeChunk = (id) => update("relevant_chunk_ids", rels.filter((x) => x !== id));

  return (
    <div className={"item " + (modified ? "modified" : "")}>
      {modified && <span className="mod-flag">modified</span>}

      <div className="item-head">
        <span className="id">#{item.id}</span>
        <select
          className="cat"
          value={item.category || ""}
          onChange={(e) => update("category", e.target.value)}
          style={chipStyle(CATEGORY_COLORS, item.category)}
        >
          {CATEGORIES.map((c) => <option key={c} value={c}>{c}</option>)}
          {item.category && !CATEGORIES.includes(item.category) && (
            <option value={item.category}>{item.category}</option>
          )}
        </select>
        <select
          className="diff"
          value={item.difficulty || ""}
          onChange={(e) => update("difficulty", e.target.value)}
          style={chipStyle(DIFFICULTY_COLORS, item.difficulty)}
        >
          {DIFFICULTIES.map((d) => <option key={d} value={d}>{d}</option>)}
          {item.difficulty && !DIFFICULTIES.includes(item.difficulty) && (
            <option value={item.difficulty}>{item.difficulty}</option>
          )}
        </select>
        <div style={{ marginLeft: "auto" }}>
          <button className="danger" onClick={onRemove} title="Delete this item">Delete</button>
        </div>
      </div>

      <div className="field">
        <label className="field-label">Question</label>
        <textarea
          rows={2}
          value={item.question || ""}
          onChange={(e) => update("question", e.target.value)}
        />
      </div>

      <div className="field">
        <label className="field-label">Ground truth</label>
        <textarea
          rows={4}
          value={item.ground_truth || ""}
          onChange={(e) => update("ground_truth", e.target.value)}
        />
      </div>

      <div className="field">
        <label className="field-label">Source hint</label>
        <textarea
          rows={1}
          value={item.source_hint || ""}
          onChange={(e) => update("source_hint", e.target.value)}
        />
      </div>

      <div className="field">
        <label className="field-label">Relevant chunk IDs ({rels.length})</label>
        <div className="chunks-row">
          {rels.map((id) => (
            <ChunkPill key={id} id={id} onRemove={() => removeChunk(id)} />
          ))}
          <input
            className="chunk-add-input"
            type="text"
            placeholder="add chunk_id, then Enter"
            value={chunkInput}
            onChange={(e) => setChunkInput(e.target.value)}
            onKeyDown={(e) => {
              if (e.key === "Enter") {
                e.preventDefault();
                addChunk(chunkInput);
                setChunkInput("");
              }
            }}
          />
          {chunks && (
            <button onClick={() => setShowSearch((v) => !v)}>
              {showSearch ? "Hide search" : "Search chunks"}
            </button>
          )}
        </div>
        {showSearch && chunks && (
          <ChunkSearch
            chunks={chunks}
            alreadyAdded={relSet}
            onAdd={addChunk}
            onClose={() => setShowSearch(false)}
          />
        )}
      </div>
    </div>
  );
}

// =======================================================================
// Components — Chunks browse panel
// =======================================================================

function ChunksPanel({ chunks, onOpen, onToast }) {
  // ALL hooks declared unconditionally before any return — Rules of Hooks.
  const [q, setQ] = useState("");
  const [articleFilter, setArticleFilter] = useState("all");

  const articles = useMemo(() => {
    if (!chunks) return [];
    return [...new Set(chunks.map((c) => c.title))].sort();
  }, [chunks]);

  const filtered = useMemo(() => {
    if (!chunks) return [];
    const needle = q.trim().toLowerCase();
    return chunks.filter((c) => {
      if (articleFilter !== "all" && c.title !== articleFilter) return false;
      if (!needle) return true;
      return c.chunk_id.toLowerCase().includes(needle)
        || (c.title || "").toLowerCase().includes(needle)
        || (c.heading || "").toLowerCase().includes(needle)
        || (c.text || "").toLowerCase().includes(needle);
    });
  }, [chunks, q, articleFilter]);

  async function copyId(id) {
    try {
      await navigator.clipboard.writeText(id);
      onToast(`Copied ${id}`);
    } catch {
      onToast("Clipboard blocked — select & copy manually.");
    }
  }

  if (!chunks) {
    return (
      <div className="container empty">
        <div className="icon">📚</div>
        <h2>No chunks loaded</h2>
        <p>Load <code>data/chunks/all_chunks.jsonl</code> to browse every indexed passage in full.</p>
        <div className="empty-actions">
          <button className="primary" onClick={onOpen}>Load chunks file</button>
        </div>
      </div>
    );
  }

  return (
    <div className="container">
      <div className="chunks-controls">
        <input
          type="text"
          placeholder="🔎  Search by chunk_id, title, heading, or text…"
          value={q}
          onChange={(e) => setQ(e.target.value)}
          className="search-input"
        />
        <select
          value={articleFilter}
          onChange={(e) => setArticleFilter(e.target.value)}
        >
          <option value="all">All articles ({chunks.length})</option>
          {articles.map((a) => (
            <option key={a} value={a}>{a}</option>
          ))}
        </select>
        <span style={{ fontSize: "0.85rem", color: "var(--muted)" }}>
          Showing <strong style={{ color: "var(--text)" }}>{filtered.length}</strong> / {chunks.length}
        </span>
        <button className="ghost" onClick={onOpen}>Reload</button>
      </div>

      <div className="chunks-list">
        {filtered.length === 0 ? (
          <div className="empty">
            <p>No chunks match the current filter.</p>
          </div>
        ) : (
          filtered.map((c) => (
            <div
              key={c.chunk_id}
              className="chunk-card"
              style={{ "--cat-color": articleColor(c.title) }}
            >
              <div className="chunk-card-head">
                <span className="id">{c.chunk_id}</span>
                <span className="sep">·</span>
                <span className="title">{c.title}</span>
                <span className="sep">/</span>
                <span className="heading">{c.heading}</span>
                <div className="tail">
                  <button className="ghost" onClick={() => copyId(c.chunk_id)} title="Copy chunk_id">
                    Copy ID
                  </button>
                </div>
              </div>
              <div className="chunk-card-text">{c.text}</div>
              <div className="chunk-card-meta">
                {c.token_count != null && <>tokens: {c.token_count}</>}
                {c.url && <> · <a href={c.url} target="_blank" rel="noopener">source ↗</a></>}
              </div>
            </div>
          ))
        )}
      </div>
    </div>
  );
}

// =======================================================================
// App — shared state, view switcher
// =======================================================================

function App() {
  const [view, setView] = useState("questions");

  const [items, setItems] = useState(null);
  const [originals, setOriginals] = useState(null);
  const [fileHandle, setFileHandle] = useState(null);
  const [fileName, setFileName] = useState(null);

  const [chunks, setChunks] = useState(null);

  const [savedAt, setSavedAt] = useState(null);
  const [filter, setFilter] = useState({ category: "all", difficulty: "all", modifiedOnly: false });
  const [toast, setToast] = useState(null);

  const fallbackQARef = useRef(null);
  const fallbackChunksRef = useRef(null);

  const flash = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 2400);
  };

  const forgetLocations = async () => {
    await idbSet("startIn_qa", null);
    await idbSet("startIn_chunks", null);
    flash("Forgot last-used folders. Next picker opens at browser default.");
  };

  // -------- file open --------
  const openQA = async () => {
    try {
      if (FS_ACCESS_SUPPORTED) {
        const { handle, name, items: opened } = await openJsonlFile("qa");
        const normalized = opened.map((it) => ({ ...it, relevant_chunk_ids: it.relevant_chunk_ids || [] }));
        setItems(normalized);
        setOriginals(normalized.map((it) => JSON.stringify(it)));
        setFileHandle(handle);
        setFileName(name);
        setSavedAt(null);
      } else {
        fallbackQARef.current?.click();
      }
    } catch (e) {
      if (e.name !== "AbortError") flash(`Open failed: ${e.message}`);
    }
  };

  const openChunks = async () => {
    try {
      if (FS_ACCESS_SUPPORTED) {
        const { items: opened } = await openJsonlFile("chunks");
        setChunks(opened);
        flash(`Loaded ${opened.length} chunks.`);
      } else {
        fallbackChunksRef.current?.click();
      }
    } catch (e) {
      if (e.name !== "AbortError") flash(`Open failed: ${e.message}`);
    }
  };

  const handleFallbackQA = async (e) => {
    const f = e.target.files?.[0];
    if (!f) return;
    const { items: opened, name } = await openJsonlFromInput(f);
    const normalized = opened.map((it) => ({ ...it, relevant_chunk_ids: it.relevant_chunk_ids || [] }));
    setItems(normalized);
    setOriginals(normalized.map((it) => JSON.stringify(it)));
    setFileName(name);
    setFileHandle(null);
  };

  const handleFallbackChunks = async (e) => {
    const f = e.target.files?.[0];
    if (!f) return;
    const { items: opened } = await openJsonlFromInput(f);
    setChunks(opened);
    flash(`Loaded ${opened.length} chunks.`);
  };

  // -------- modify --------
  const modifiedIndices = useMemo(() => {
    if (!items || !originals) return new Set();
    const s = new Set();
    items.forEach((it, i) => {
      if (JSON.stringify(it) !== originals[i]) s.add(i);
    });
    return s;
  }, [items, originals]);

  const updateItemAt = useCallback((idx, next) => {
    setItems((prev) => prev.map((it, i) => (i === idx ? next : it)));
  }, []);

  const deleteItemAt = useCallback((idx) => {
    if (!confirm(`Delete item #${items[idx].id}?`)) return;
    setItems((prev) => prev.filter((_, i) => i !== idx));
    setOriginals((prev) => prev.filter((_, i) => i !== idx));
  }, [items]);

  const saveAll = async () => {
    if (!items) return;
    const text = serializeJsonl(items);
    try {
      if (fileHandle) {
        await writeToHandle(fileHandle, text);
        setOriginals(items.map((it) => JSON.stringify(it)));
        setSavedAt(new Date());
        flash(`Saved ${items.length} items to ${fileName}.`);
      } else {
        downloadText(fileName || "qa_set.jsonl", text);
        setOriginals(items.map((it) => JSON.stringify(it)));
        setSavedAt(new Date());
        flash(`Downloaded ${fileName || "qa_set.jsonl"}.`);
      }
    } catch (e) {
      flash(`Save failed: ${e.message}`);
    }
  };

  // -------- filtered view --------
  const filtered = useMemo(() => {
    if (!items) return [];
    return items
      .map((it, i) => [i, it])
      .filter(([i, it]) => {
        if (filter.category !== "all" && it.category !== filter.category) return false;
        if (filter.difficulty !== "all" && it.difficulty !== filter.difficulty) return false;
        if (filter.modifiedOnly && !modifiedIndices.has(i)) return false;
        return true;
      });
  }, [items, filter, modifiedIndices]);

  const stats = useMemo(() => {
    if (!items) return null;
    const noRel = items.filter((it) => (it.relevant_chunk_ids || []).length === 0).length;
    return {
      total: items.length,
      modified: modifiedIndices.size,
      noRel,
      totalRel: items.reduce((s, it) => s + (it.relevant_chunk_ids || []).length, 0),
    };
  }, [items, modifiedIndices]);

  useEffect(() => {
    const beforeUnload = (e) => {
      if (modifiedIndices.size > 0) {
        e.preventDefault();
        e.returnValue = "";
      }
    };
    window.addEventListener("beforeunload", beforeUnload);
    return () => window.removeEventListener("beforeunload", beforeUnload);
  }, [modifiedIndices]);

  // -------- header --------
  const header = (
    <div className="header">
      <div className="container header-inner">
        <h1>askISTANBUL — QA Label Reviewer</h1>
        <div className="tabs">
          <button
            className={"tab " + (view === "questions" ? "active" : "")}
            onClick={() => setView("questions")}
          >
            ✏️  Edit questions
          </button>
          <button
            className={"tab " + (view === "chunks" ? "active" : "")}
            onClick={() => setView("chunks")}
          >
            📚  Browse chunks {chunks && <span style={{ fontWeight: 400, color: "var(--muted)", marginLeft: 4 }}>({chunks.length})</span>}
          </button>
        </div>

        {view === "questions" && items && (
          <div className="toolbar">
            <button onClick={openQA} title="Open a different QA JSONL file">Open…</button>
            <button onClick={openChunks} title="Load all_chunks.jsonl">
              {chunks ? "Chunks ✓ reload" : "Load chunks"}
            </button>
            <button className="ghost" onClick={forgetLocations} title="Forget remembered folders for the file pickers">
              Reset folder memory
            </button>
            <select
              value={filter.category}
              onChange={(e) => setFilter({ ...filter, category: e.target.value })}
            >
              <option value="all">All categories</option>
              {CATEGORIES.map((c) => <option key={c} value={c}>{c}</option>)}
            </select>
            <select
              value={filter.difficulty}
              onChange={(e) => setFilter({ ...filter, difficulty: e.target.value })}
            >
              <option value="all">All difficulties</option>
              {DIFFICULTIES.map((d) => <option key={d} value={d}>{d}</option>)}
            </select>
            <label style={{ display: "flex", alignItems: "center", gap: 4, fontSize: "0.875rem" }}>
              <input
                type="checkbox"
                checked={filter.modifiedOnly}
                onChange={(e) => setFilter({ ...filter, modifiedOnly: e.target.checked })}
              />
              Modified only
            </label>

            <div className="stats">
              {fileName && <span style={{ fontFamily: "ui-monospace, monospace", fontSize: "0.8rem" }}>{fileName}</span>}
              <span><span className="badge">{stats.total}</span> items</span>
              <span><span className={"badge " + (stats.modified ? "modified" : "")}>{stats.modified}</span> modified</span>
              <span><span className="badge">{stats.totalRel}</span> labels</span>
              <span><span className="badge">{stats.noRel}</span> empty</span>
              {savedAt && (
                <span className="save-time">✓ Saved {savedAt.toLocaleTimeString()}</span>
              )}
            </div>

            <button
              className="success"
              onClick={saveAll}
              disabled={stats.modified === 0}
              title={stats.modified === 0 ? "No changes" : `Save ${stats.modified} modified item(s)`}
            >
              💾  Save all
            </button>
          </div>
        )}
      </div>
    </div>
  );

  // -------- render --------
  if (view === "chunks") {
    return (
      <>
        {header}
        <ChunksPanel chunks={chunks} onOpen={openChunks} onToast={flash} />
        {toast && <div className="toast show">{toast}</div>}
        <input
          ref={fallbackChunksRef}
          type="file"
          accept=".jsonl,.json,application/jsonlines"
          style={{ display: "none" }}
          onChange={handleFallbackChunks}
        />
      </>
    );
  }

  if (!items) {
    return (
      <>
        {header}
        <div className="container empty">
          <div className="icon">📝</div>
          <h2>Open a QA JSONL file to start</h2>
          <p>Expected per line: <code>{`{id, category, difficulty, question, ground_truth, source_hint, relevant_chunk_ids?}`}</code></p>
          <p style={{ fontSize: "0.85rem" }}>
            Navigate to <code>data/eval/qa_draft.jsonl</code> the first time — the picker will remember
            the folder afterward (this session and across reloads).
          </p>
          <div className="empty-actions">
            <button className="primary" onClick={openQA}>📂  Open qa_draft.jsonl</button>
          </div>
          {!FS_ACCESS_SUPPORTED && (
            <p style={{ marginTop: 24, fontSize: "0.85rem" }}>
              Your browser doesn't support the File System Access API; saves will download a new file. (Chrome/Edge work natively.)
            </p>
          )}
        </div>
        <input
          ref={fallbackQARef}
          type="file"
          accept=".jsonl,.json,application/jsonlines"
          style={{ display: "none" }}
          onChange={handleFallbackQA}
        />
        <input
          ref={fallbackChunksRef}
          type="file"
          accept=".jsonl,.json,application/jsonlines"
          style={{ display: "none" }}
          onChange={handleFallbackChunks}
        />
        {toast && <div className="toast show">{toast}</div>}
      </>
    );
  }

  return (
    <>
      {header}
      <div className="container items">
        <div className="nav-bar">
          Showing {filtered.length} / {stats.total} items
        </div>
        {filtered.length === 0 ? (
          <div className="empty">
            <p>No items match the current filter.</p>
          </div>
        ) : (
          filtered.map(([idx, it]) => (
            <Item
              key={it.id ?? idx}
              item={it}
              modified={modifiedIndices.has(idx)}
              chunks={chunks}
              onChange={(next) => updateItemAt(idx, next)}
              onRemove={() => deleteItemAt(idx)}
            />
          ))
        )}
      </div>

      {toast && <div className="toast show">{toast}</div>}

      <input
        ref={fallbackQARef}
        type="file"
        accept=".jsonl,.json,application/jsonlines"
        style={{ display: "none" }}
        onChange={handleFallbackQA}
      />
      <input
        ref={fallbackChunksRef}
        type="file"
        accept=".jsonl,.json,application/jsonlines"
        style={{ display: "none" }}
        onChange={handleFallbackChunks}
      />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>
